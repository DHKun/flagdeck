[graph]
all-features = true
exclude-dev = true
targets = ["x86_64-unknown-linux-gnu"]

[advisories]
version = 2
yanked = "deny"
# Current Tauri 2 Linux builds transitively use the GTK3/WebKitGTK stack and
# urlpattern's unic crates. Every entry below is an unmaintained-package notice
# with no safe compatible upgrade. Fedora supplies the native GTK/WebKitGTK
# runtime, while Cargo.lock and the release audit preserve the Rust dependency
# graph for repeatable review.
ignore = [
  "RUSTSEC-2024-0370",
  "RUSTSEC-2024-0411",
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0098",
  "RUSTSEC-2025-0100",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "CC0-1.0",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
