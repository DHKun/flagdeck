id = "hashcat"
name = "hashcat"
category = "crypto"
summary = "哈希爆破（字典 / 掩码）"

usage = """
【FlagDeck 表单】
• 必填：哈希/文件、类型 -m、攻击模式 -a、负载 -w
• 可选：字典、掩码、规则、增量、runtime、potfile、force

完整帮助：hashcat -h / hashcat -hh
仅限 CTF / 自有哈希 / 授权场景。
"""
mode = "embedded_cli"
featured = true

[binary]
command = "hashcat"
path = "/usr/bin/hashcat"
resolve = ["path", "system"]

[ui]
icon = "key"
accent = "red"

[[form.fields]]
id = "hash"
type = "text"
label = "哈希或哈希文件"
required = true
hint = "单行哈希字符串，或哈希列表文件的绝对路径"

[[form.fields]]
id = "hash_type"
type = "text"
label = "哈希类型 -m"
default = "0"
required = true
hint = "数字模式：0=MD5，100=SHA1，1400=SHA256，1800=sha512crypt，3200=bcrypt… 详见 hashcat -hh"

[[form.fields]]
id = "attack_mode"
type = "select"
label = "攻击模式 -a"
default = "0"
options = ["0", "1", "3", "6", "7", "9"]
required = true
hint = "0 字典 / 1 组合 / 3 掩码 / 6 混合字典+掩码 / 7 混合掩码+字典 / 9 关联"

[[form.fields]]
id = "wordlist"
type = "wordlist"
label = "字典（-a 0/1/6/7）"
default = ""
required = false
hint = "字典模式必选；掩码模式可留空。rockyou 等大字典耗时长"

[[form.fields]]
id = "mask"
type = "text"
label = "掩码（-a 3/6/7，可选）"
default = ""
required = false
hint = "例 ?l?l?l?l?d?d（4 小写+2 数字）；?d=数字 ?l=小写 ?u=大写 ?s=符号 ?a=全部"

[[form.fields]]
id = "rules"
type = "text"
label = "规则文件 -r（可选）"
default = ""
required = false
hint = "字典变形规则文件绝对路径，例 best64.rule"

[[form.fields]]
id = "workload"
type = "select"
label = "负载 -w"
default = "2"
options = ["1", "2", "3", "4"]
required = true
hint = "1 低～4 高；越高 GPU/CPU 占用越大、速度越快"

[[form.fields]]
id = "optimized"
type = "select"
label = "优化内核 -O"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=启用优化内核，通常更快但限制密码最大长度"

[[form.fields]]
id = "force"
type = "select"
label = "--force 忽略警告"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=忽略驱动/自检警告；仅在确认环境可接受时用"

[[form.fields]]
id = "runtime"
type = "number"
label = "限时秒 --runtime（可选）"
default = ""
required = false
hint = "跑满 N 秒自动停，便于试跑"

[[form.fields]]
id = "increment"
type = "select"
label = "增量 --increment（掩码）"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=从短到长逐步加长掩码（配合 increment-min/max）"

[[form.fields]]
id = "increment_min"
type = "number"
label = "--increment-min（可选）"
default = ""
required = false
hint = "增量最小长度"

[[form.fields]]
id = "increment_max"
type = "number"
label = "--increment-max（可选）"
default = ""
required = false
hint = "增量最大长度"

[[form.fields]]
id = "username"
type = "select"
label = "哈希含用户名 --username"
default = "no"
options = ["no", "yes"]
required = true
hint = "哈希文件为 user:hash 格式时开 yes"

[[form.fields]]
id = "potfile_disable"
type = "select"
label = "禁用 potfile"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=不读写 hashcat.potfile（干净试跑）"

[[form.fields]]
id = "outfile"
type = "select"
label = "写出结果 -o 到任务目录"
default = "yes"
options = ["yes", "no"]
required = true
hint = "yes=破解结果写入任务目录 hashcat.out"

[[form.fields]]
id = "status_timer"
type = "number"
label = "状态刷新秒 --status-timer（可选）"
default = ""
required = false
hint = "开启状态屏刷新间隔；便于看进度"

[argv]
template = [
  "-m",
  "{hash_type}",
  "-a",
  "{attack_mode}",
  "-w",
  "{workload}",
  "{hash}",
]

[[argv.optional]]
field = "force"
equals = "yes"
args = ["--force"]

[[argv.optional]]
field = "optimized"
equals = "yes"
args = ["-O"]

[[argv.optional]]
field = "outfile"
equals = "yes"
args = ["-o", "{job_dir}/hashcat.out"]

[[argv.optional]]
field = "wordlist"
args = ["{wordlist}"]

[[argv.optional]]
field = "mask"
args = ["{mask}"]

[[argv.optional]]
field = "rules"
args = ["-r", "{rules}"]

[[argv.optional]]
field = "runtime"
args = ["--runtime", "{runtime}"]

[[argv.optional]]
field = "increment"
equals = "yes"
args = ["--increment"]

[[argv.optional]]
field = "increment_min"
args = ["--increment-min", "{increment_min}"]

[[argv.optional]]
field = "increment_max"
args = ["--increment-max", "{increment_max}"]

[[argv.optional]]
field = "username"
equals = "yes"
args = ["--username"]

[[argv.optional]]
field = "potfile_disable"
equals = "yes"
args = ["--potfile-disable"]

[[argv.optional]]
field = "status_timer"
args = ["--status", "--status-timer", "{status_timer}"]

[parser]
kind = "none"

[limits]
timeout_millis = 7200000
memory_max_bytes = 2147483648
