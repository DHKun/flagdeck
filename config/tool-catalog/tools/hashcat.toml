id = "hashcat"
name = "hashcat"
category = "crypto"
summary = "哈希爆破（字典 / 掩码）"

usage = """
【FlagDeck 表单】
• 哈希或哈希文件、hash 类型 -m、攻击模式 -a、字典
• 可选掩码（-a 3）、workload -w、--force

【实际调用】
hashcat -m TYPE -a MODE hash|file [wordlist|mask] [--force] [-w N]

完整帮助：hashcat -h / hashcat -hh
仅限 CTF / 自有哈希 / 授权场景。
"""
mode = "embedded_cli"
featured = true
detach = false

[binary]
command = "hashcat"
path = "/usr/bin/hashcat"
resolve = ["path", "system"]

[ui]
icon = "key"
accent = "red"

[[form.fields]]
id = "hash"
type = "text"
label = "哈希或哈希文件"
required = true
hint = "单行哈希，或绝对路径到 hash 文件"

[[form.fields]]
id = "hash_type"
type = "text"
label = "哈希类型 -m"
default = "0"
required = true
hint = "0=MD5, 100=SHA1, 1400=SHA256, 1800=sha512crypt… 见 hashcat -hh"

[[form.fields]]
id = "attack_mode"
type = "select"
label = "攻击模式 -a"
default = "0"
options = ["0", "1", "3", "6", "7"]
required = true
hint = "0 字典 / 3 掩码 / 6 混合等"

[[form.fields]]
id = "wordlist"
type = "wordlist"
label = "字典（-a 0/6/7）"
default = ""
required = false
hint = "字典模式请选择；掩码模式留空"

[[form.fields]]
id = "mask"
type = "text"
label = "掩码（-a 3，可选）"
default = ""
required = false
hint = "例 ?l?l?l?l?d?d"

[[form.fields]]
id = "workload"
type = "select"
label = "负载 -w"
default = "2"
options = ["1", "2", "3", "4"]
required = true

[[form.fields]]
id = "force"
type = "select"
label = "--force 忽略警告"
default = "no"
options = ["no", "yes"]
required = true

[[form.fields]]
id = "outfile"
type = "select"
label = "写出到任务目录 pot 外结果"
default = "yes"
options = ["yes", "no"]
required = true

[argv]
template = [
  "-m",
  "{hash_type}",
  "-a",
  "{attack_mode}",
  "-w",
  "{workload}",
  "{hash}",
]

[[argv.optional]]
field = "force"
equals = "yes"
args = ["--force"]

[[argv.optional]]
field = "outfile"
equals = "yes"
args = ["-o", "{job_dir}/hashcat.out"]

[[argv.optional]]
field = "wordlist"
args = ["{wordlist}"]

[[argv.optional]]
field = "mask"
args = ["{mask}"]

[parser]
kind = "none"

[limits]
timeout_millis = 7200000
memory_max_bytes = 2147483648
