id = "payloader"
name = "Payloader"
category = "gui"
summary = "Payload 构造工作台（桌面 AppImage）"

usage = """
【类型】独立 GUI（Payloader Client 2.0，linux x86_64）

【FlagDeck】
一键启动本机 AppImage（经 start-payloader.sh），无需填写目标 URL。
Payload / 攻击链 / 编解码均在客户端窗口内操作。

【注意】
• 需要图形桌面会话（DISPLAY / XAUTHORITY）
• 包装脚本默认 APPIMAGE_EXTRACT_AND_RUN=1（不依赖 FUSE）
• 仅在授权靶场 / CTF 环境使用
"""
mode = "external_launch"
featured = false
platforms = ["linux"]
# Windowed GUI: detach after probe (cancel not needed once the window is up).
detach = true
cwd = "Active/Payloader"

[binary]
command = "start-payloader.sh"
path = "Active/Payloader/start-payloader.sh"
resolve = ["tools_root", "path"]

[ui]
icon = "app"
accent = "indigo"

[form]
fields = []

[argv]
template = []

[parser]
kind = "none"

[limits]
timeout_millis = 86400000
memory_max_bytes = 2147483648
tasks_max = 256
