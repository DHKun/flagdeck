id = "whoamifuck"
name = "Whoamifuck"
category = "defensive"
summary = "Linux 主机入侵排查脚本（需 root）"

usage = """
【FlagDeck 表单】
• 模式：帮助 / 默认运行
• 多数检查项需要 root；非 root 会直接退出提示

上游：enomothem/Whoamifuck。仅限授权主机自查 / AWD 防守。
"""
mode = "embedded_cli"
featured = false
cwd = "Defensive/Incident-Response/sec-import/Whoamifuck"

[binary]
command = "bash"
path = ""
resolve = ["system"]

[ui]
icon = "shield"
accent = "green"

[[form.fields]]
id = "mode"
type = "select"
label = "模式"
default = "help"
options = ["help", "default"]
required = true
hint = "help=打印帮助与菜单说明；default=尝试完整运行（强烈建议 sudo/root）"

[argv]
template = [
  "{tools_root}/Defensive/Incident-Response/sec-import/Whoamifuck/whoamifuck.sh",
]

[[argv.optional]]
field = "mode"
equals = "help"
args = ["-h"]

[parser]
kind = "none"

[limits]
timeout_millis = 600000
memory_max_bytes = 268435456
