id = "gobuster"
name = "gobuster"
category = "content_discovery"
summary = "目录枚举（gobuster dir）"

usage = """
【FlagDeck 表单】
• 必填：URL、字典、线程、超时
• 可选：扩展名、状态码、Cookie、认证、UA、代理、TLS 等

完整帮助：gobuster dir -h（需本机安装 gobuster）
"""
mode = "embedded_cli"
featured = true

[binary]
command = "gobuster"
path = ""
resolve = ["system"]

[ui]
icon = "folder"
accent = "orange"

[[form.fields]]
id = "url"
type = "url"
label = "目标 URL -u"
required = true
from = "target_url"
hint = "站点根或子目录，例 http://target/ 或 http://target/app/"

[[form.fields]]
id = "wordlist"
type = "wordlist"
label = "字典 -w"
required = true
default = "seclists-common"
hint = "目录/文件名字典"

[[form.fields]]
id = "threads"
type = "number"
label = "线程 -t"
default = "20"
required = true
hint = "并发数；过大易被封"

[[form.fields]]
id = "extensions"
type = "text"
label = "扩展名 -x（可选）"
default = ""
required = false
hint = "逗号分隔，例 php,txt,bak,zip,old"

[[form.fields]]
id = "status_codes"
type = "text"
label = "匹配状态码 -s（可选）"
default = ""
required = false
hint = "只显示这些状态；留空用 gobuster 默认（常见 200,204,301,302,307,401,403）"

[[form.fields]]
id = "status_blacklist"
type = "text"
label = "状态码黑名单（可选）"
default = "404"
required = false
hint = "--status-codes-blacklist：丢弃这些状态，默认过滤 404"

[[form.fields]]
id = "insecure"
type = "select"
label = "忽略 TLS 证书 -k"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=跳过证书校验（HTTPS 自签靶场）"

[[form.fields]]
id = "follow_redirect"
type = "select"
label = "跟随重定向 -r"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=跟随 3xx；可能把结果算到跳转后的页面"

[[form.fields]]
id = "cookies"
type = "text"
label = "Cookie -c（可选）"
default = ""
required = false
hint = "已登录会话 Cookie，扫后台目录时常用"

[[form.fields]]
id = "headers"
type = "text"
label = "请求头 -H（可选）"
default = ""
required = false
hint = "单条自定义头，例 X-Custom: 1"

[[form.fields]]
id = "user_agent"
type = "text"
label = "User-Agent -a（可选）"
default = ""
required = false
hint = "自定义 UA；部分 WAF 拦默认 gobuster UA"

[[form.fields]]
id = "username"
type = "text"
label = "基本认证用户 -U（可选）"
default = ""
required = false
hint = "HTTP Basic Auth 用户名"

[[form.fields]]
id = "password"
type = "text"
label = "基本认证密码 -P（可选）"
default = ""
required = false
hint = "HTTP Basic Auth 密码（与 -U 成对）"

[[form.fields]]
id = "proxy"
type = "text"
label = "代理 --proxy（可选）"
default = ""
required = false
hint = "例 http://127.0.0.1:8080"

[[form.fields]]
id = "timeout"
type = "text"
label = "超时 --timeout"
default = "10s"
required = true
hint = "单请求超时，如 10s、30s"

[[form.fields]]
id = "no_tls_validation"
type = "select"
label = "等同 -k（兼容）"
default = "no"
options = ["no", "yes"]
required = true
hint = "与「忽略 TLS」相同语义时可开其一即可"

[[form.fields]]
id = "exclude_length"
type = "text"
label = "排除长度 --exclude-length（可选）"
default = ""
required = false
hint = "丢弃指定 body 长度的响应，滤统一错误页"

[argv]
template = [
  "dir",
  "-u",
  "{url}",
  "-w",
  "{wordlist}",
  "-t",
  "{threads}",
  "--timeout",
  "{timeout}",
  "-o",
  "{job_dir}/gobuster-output.txt",
  "-q",
  "--no-error",
  "--no-color",
]

[[argv.optional]]
field = "extensions"
args = ["-x", "{extensions}"]

[[argv.optional]]
field = "status_codes"
args = ["-s", "{status_codes}"]

[[argv.optional]]
field = "status_blacklist"
args = ["--status-codes-blacklist", "{status_blacklist}"]

[[argv.optional]]
field = "insecure"
equals = "yes"
args = ["-k"]

[[argv.optional]]
field = "no_tls_validation"
equals = "yes"
args = ["-k"]

[[argv.optional]]
field = "follow_redirect"
equals = "yes"
args = ["-r"]

[[argv.optional]]
field = "cookies"
args = ["-c", "{cookies}"]

[[argv.optional]]
field = "headers"
args = ["-H", "{headers}"]

[[argv.optional]]
field = "user_agent"
args = ["-a", "{user_agent}"]

[[argv.optional]]
field = "username"
args = ["-U", "{username}"]

[[argv.optional]]
field = "password"
args = ["-P", "{password}"]

[[argv.optional]]
field = "proxy"
args = ["--proxy", "{proxy}"]

[[argv.optional]]
field = "exclude_length"
args = ["--exclude-length", "{exclude_length}"]

[parser]
kind = "none"

[limits]
timeout_millis = 600000
memory_max_bytes = 268435456
