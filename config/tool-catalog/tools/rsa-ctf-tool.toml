id = "rsa-ctf-tool"
name = "RsaCtfTool"
category = "crypto"
summary = "RSA CTF 公钥攻击 / 私钥恢复（Scripts）"

usage = """
【FlagDeck 表单】
• 输入：公钥文件 或 n/e（或 p/q/d）
• 可选：攻击名、超时、解密密文、私钥输出

完整帮助：python3 RsaCtfTool.py -h
仅限 CTF / 靶场。
"""
mode = "embedded_cli"
featured = true
cwd = "Scripts/sec-import/Crypto/RsaCtfTool"

[binary]
command = "python3"
path = ""
resolve = ["system"]

[ui]
icon = "key"
accent = "purple"

[[form.fields]]
id = "publickey"
type = "text"
label = "公钥文件 --publickey（可选）"
default = ""
required = false
hint = "PEM/DER/.pub 绝对路径；与 n/e 二选一为主输入"

[[form.fields]]
id = "n"
type = "text"
label = "模数 -n（可选）"
default = ""
required = false
hint = "RSA 模数 N，十进制或 0x 十六进制"

[[form.fields]]
id = "e"
type = "text"
label = "指数 -e（可选）"
default = "65537"
required = false
hint = "公钥指数，常见 65537 或 3；多个用逗号分隔"

[[form.fields]]
id = "p"
type = "text"
label = "素数 -p（可选）"
default = ""
required = false
hint = "已知 p 时填入，用于构造私钥"

[[form.fields]]
id = "q"
type = "text"
label = "素数 -q（可选）"
default = ""
required = false
hint = "已知 q 时填入"

[[form.fields]]
id = "d"
type = "text"
label = "私钥指数 -d（可选）"
default = ""
required = false
hint = "已知 d 时填入"

[[form.fields]]
id = "attack"
type = "text"
label = "攻击 --attack（可选）"
default = "all"
required = false
hint = "all=自动尝试多种；或 wiener,fermat,factordb,hastads 等（见 -h 列表）"

[[form.fields]]
id = "timeout"
type = "number"
label = "超时秒 --timeout"
default = "60"
required = true
hint = "单类长攻击超时；复杂分解可调到 300+"

[[form.fields]]
id = "private"
type = "select"
label = "输出私钥 --private"
default = "yes"
options = ["yes", "no"]
required = true
hint = "成功时打印私钥 PEM"

[[form.fields]]
id = "decrypt"
type = "text"
label = "解密密文 --decrypt（可选）"
default = ""
required = false
hint = "密文整数；多个逗号分隔；恢复私钥后解密"

[[form.fields]]
id = "decryptfile"
type = "text"
label = "解密文件 --decryptfile（可选）"
default = ""
required = false
hint = "密文文件绝对路径"

[[form.fields]]
id = "verbosity"
type = "select"
label = "日志级别 --verbosity"
default = "INFO"
options = ["CRITICAL", "ERROR", "WARNING", "INFO", "DEBUG"]
required = true
hint = "DEBUG 可看攻击过程细节"

[[form.fields]]
id = "sendtofdb"
type = "select"
label = "上传 factordb --sendtofdb"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=分解结果提交 FactorDB（需出网，CTF 慎用）"

[[form.fields]]
id = "output"
type = "select"
label = "结果写入任务目录"
default = "yes"
options = ["yes", "no"]
required = true
hint = "yes=--output 写到任务目录 rsa-result.txt"

[argv]
template = [
  "{tools_root}/Scripts/sec-import/Crypto/RsaCtfTool/RsaCtfTool.py",
  "--timeout",
  "{timeout}",
  "--verbosity",
  "{verbosity}",
]

[[argv.optional]]
field = "publickey"
args = ["--publickey", "{publickey}"]

[[argv.optional]]
field = "n"
args = ["-n", "{n}"]

[[argv.optional]]
field = "e"
args = ["-e", "{e}"]

[[argv.optional]]
field = "p"
args = ["-p", "{p}"]

[[argv.optional]]
field = "q"
args = ["-q", "{q}"]

[[argv.optional]]
field = "d"
args = ["-d", "{d}"]

[[argv.optional]]
field = "attack"
args = ["--attack", "{attack}"]

[[argv.optional]]
field = "private"
equals = "yes"
args = ["--private"]

[[argv.optional]]
field = "decrypt"
args = ["--decrypt", "{decrypt}"]

[[argv.optional]]
field = "decryptfile"
args = ["--decryptfile", "{decryptfile}"]

[[argv.optional]]
field = "sendtofdb"
equals = "yes"
args = ["--sendtofdb"]

[[argv.optional]]
field = "output"
equals = "yes"
args = ["--output", "{job_dir}/rsa-result.txt"]

[parser]
kind = "none"

[limits]
timeout_millis = 600000
memory_max_bytes = 1073741824
