id = "fscan-web"
name = "fscan-web"
category = "gui"
summary = "fscan Web 管理界面（Active，本地 HTTP 服务）"

usage = """
【类型】fscan 2.1.3 Web 版

【FlagDeck】
必须带 -web 才会启动 Web 管理界面（无参数只会打印 Usage 后退出）。
默认访问：http://127.0.0.1:10240

任务保持「运行中」时可点「停止当前任务」结束服务。
仅限授权内网/靶场。

本机验证：
  ./fscan-web_2.1.3_linux_x64 -web -webport 10240
"""
mode = "external_launch"
featured = true
platforms = ["linux"]
# Long-running HTTP server: keep managed so stop/cancel works.
detach = false
cwd = "Active/fscan"

[binary]
command = "fscan-web"
path = "Active/fscan/fscan-web_2.1.3_linux_x64"
resolve = ["tools_root", "path"]

[ui]
icon = "scan"
accent = "teal"

[[form.fields]]
id = "webport"
type = "number"
label = "Web 端口 -webport"
default = "10240"
required = true
hint = "浏览器访问 http://127.0.0.1:<端口>；默认 10240。端口占用时请改成其他值"

[[form.fields]]
id = "note"
type = "text"
label = "备注（不传给程序）"
default = ""
required = false
hint = "启动后请在浏览器打开上方端口；扫描目标在 Web UI 内配置，不在此表单填写"

[argv]
template = [
  "-web",
  "-webport",
  "{webport}",
]

[parser]
kind = "none"

[limits]
timeout_millis = 86400000
memory_max_bytes = 2147483648
