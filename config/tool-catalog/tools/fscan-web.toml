id = "fscan-web"
name = "fscan-web"
category = "gui"
summary = "fscan Web UI（Active，独立服务/窗口）"

usage = """
【类型】fscan 2.1.3 Web 版二进制

【FlagDeck】
启动 Active/fscan/fscan-web_2.1.3_linux_x64。
浏览器访问其提示的本地端口（见任务日志）。

任务默认分离（GUI/服务自管）；若需停进程可在系统侧结束。
仅限授权内网/靶场。
"""
mode = "external_launch"
featured = true
detach = true
cwd = "Active/fscan"

[binary]
command = "fscan-web"
path = "Active/fscan/fscan-web_2.1.3_linux_x64"
resolve = ["tools_root", "path"]

[ui]
icon = "scan"
accent = "teal"

[form]
fields = []

[argv]
template = []

[parser]
kind = "none"

[limits]
timeout_millis = 86400000
memory_max_bytes = 2147483648
