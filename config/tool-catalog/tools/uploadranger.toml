id = "uploadranger"
name = "UploadRanger"
category = "gui"
summary = "文件上传漏洞测试 GUI（独立窗口）"

usage = """
【类型】独立 GUI（UploadRanger）

【FlagDeck】
通过工具目录内 UploadRanger.sh 启动：
• 使用隔离 .venv（含 PySide6 等依赖）
• 无需填写目标 URL

【注意】
• 需要图形桌面会话（DISPLAY / XAUTHORITY）
• 首次运行脚本可能通过 uv 安装依赖
• 仅在授权靶场 / CTF 环境使用
"""
mode = "external_launch"
featured = true
cwd = "Active/UploadRanger"
# Windowed GUI: detach after probe (cancel not needed once the window is up).
detach = true

[binary]
command = "UploadRanger.sh"
path = "Active/UploadRanger/UploadRanger.sh"
resolve = ["tools_root", "path"]

[ui]
icon = "app"
accent = "purple"

[form]
fields = []

[argv]
template = []

[parser]
kind = "none"

[limits]
timeout_millis = 86400000
memory_max_bytes = 2147483648
tasks_max = 256
