id = "yafu"
name = "yafu"
category = "crypto"
summary = "整数分解（Crypto Toolkit/yafu，Linux ELF）"

usage = """
【FlagDeck 表单】
• 表达式 fact(N) / siqs(N)

【实际调用】
在 yafu 目录下：./yafu "fact(N)"

若提示权限不够：chmod +x Crypto/sec-import/Toolkit/yafu/yafu
"""
mode = "embedded_cli"
featured = true
cwd = "Crypto/sec-import/Toolkit/yafu"

[binary]
command = "yafu"
path = "Crypto/sec-import/Toolkit/yafu/yafu"
resolve = ["tools_root", "path"]

[ui]
icon = "calc"
accent = "teal"

[[form.fields]]
id = "expression"
type = "text"
label = "yafu 表达式"
required = true
default = "fact(1234567891)"
hint = "fact(N)=分解整数。例 fact(1234567891)。过大整数会很慢。"

[[form.fields]]
id = "note"
type = "text"
label = "备注（不传给程序）"
default = ""
required = false
hint = "仅本地备忘，不参与命令行；可写题目编号"

[argv]
template = ["{expression}"]

[parser]
kind = "none"

[limits]
timeout_millis = 1800000
memory_max_bytes = 1073741824
