id = "whois"
name = "whois"
category = "dns"
summary = "查询域名 / IP 注册信息"

usage = """
【FlagDeck 表单】
• 必填：域名或 IP
• 可选：指定 whois 服务器、端口、隐藏法律声明、详细模式

完整帮助：whois --help
"""
mode = "embedded_cli"
featured = false

[binary]
command = "whois"
path = "/usr/bin/whois"
resolve = ["path", "system"]

[ui]
icon = "search"
accent = "gray"

[[form.fields]]
id = "object"
type = "text"
label = "查询对象"
required = true
hint = "域名（example.com）或 IP；得到注册人/ASN/网段等公开信息"

[[form.fields]]
id = "host"
type = "text"
label = "Whois 服务器 -h（可选）"
default = ""
required = false
hint = "强制查询某服务器，例 whois.verisign-grs.com、whois.arin.net"

[[form.fields]]
id = "port"
type = "number"
label = "端口 -p（可选）"
default = ""
required = false
hint = "非默认 whois 端口时指定（少见）"

[[form.fields]]
id = "hide_legal"
type = "select"
label = "隐藏法律声明 -H"
default = "yes"
options = ["yes", "no"]
required = true
hint = "yes=少打印冗长免责声明，输出更干净"

[[form.fields]]
id = "verbose"
type = "select"
label = "详细 --verbose"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=解释查询过程（跟转、服务器选择）"

[[form.fields]]
id = "no_recursion"
type = "select"
label = "--no-recursion"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=不从注册局跟转到注册商，只看第一跳响应"

[argv]
template = []
suffix = ["{object}"]

[[argv.optional]]
field = "host"
args = ["-h", "{host}"]

[[argv.optional]]
field = "port"
args = ["-p", "{port}"]

[[argv.optional]]
field = "hide_legal"
equals = "yes"
args = ["-H"]

[[argv.optional]]
field = "verbose"
equals = "yes"
args = ["--verbose"]

[[argv.optional]]
field = "no_recursion"
equals = "yes"
args = ["--no-recursion"]

[parser]
kind = "none"

[limits]
timeout_millis = 60000
memory_max_bytes = 67108864
