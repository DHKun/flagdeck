id = "gittools-extractor"
name = "GitTools Extractor"
category = "web_exploit"
summary = "从已 dump 的破损 .git 中提取提交与文件"

usage = """
【前置】
先用 git-dumper / GitTools Dumper 拉下含 .git 的目录。

【实际调用】
bash extractor.sh GIT-DIR DEST-DIR
输出默认写到任务目录 gittools-extracted/。

上游：GitTools/Extractor
"""
mode = "embedded_cli"
featured = true
cwd = "Active/git-leak/GitTools/Extractor"

[binary]
command = "bash"
path = ""
resolve = ["system"]

[ui]
icon = "git"
accent = "teal"

[[form.fields]]
id = "git_dir"
type = "text"
label = "含 .git 的目录"
required = true
hint = "绝对路径：该目录下必须存在 .git/ 子目录（dump 输出根目录）"

[argv]
template = [
  "{tools_root}/Active/git-leak/GitTools/Extractor/extractor.sh",
  "{git_dir}",
  "{job_dir}/gittools-extracted",
]

[parser]
kind = "none"

[limits]
timeout_millis = 1800000
memory_max_bytes = 1073741824
