id = "gittools-dumper"
name = "GitTools Dumper"
category = "web_exploit"
summary = "经典 .git 目录拉取脚本（internetwache/GitTools）"

usage = """
【实际调用】
bash gitdumper.sh 'http://target/.git/' dest-dir [--git-dir=.git] [--no-redirects]

注意：URL 一般需要以 /.git/ 结尾（含尾斜杠）。
拉完后可用 GitTools Extractor 从破损仓库抽文件。

上游：https://github.com/internetwache/GitTools
"""
mode = "embedded_cli"
featured = true
cwd = "Active/git-leak/GitTools/Dumper"

[binary]
command = "bash"
path = ""
resolve = ["system"]

[ui]
icon = "git"
accent = "blue"

[[form.fields]]
id = "url"
type = "url"
label = "目标 .git URL"
required = true
from = "target_url"
hint = "必须类似 http://target/.git/（含 .git 与尾斜杠），否则脚本可能报错"

[[form.fields]]
id = "git_dir"
type = "text"
label = "远程目录名 --git-dir（可选）"
default = ""
required = false
hint = "默认 .git；若泄露目录叫 .git_backup 等则填该名"

[[form.fields]]
id = "no_redirects"
type = "select"
label = "不跟随重定向 --no-redirects"
default = "no"
options = ["no", "yes"]
required = true
hint = "yes=禁用跟随 3xx，避免跳到登录页导致 dump 失败"

[argv]
template = [
  "{tools_root}/Active/git-leak/GitTools/Dumper/gitdumper.sh",
  "{url}",
  "{job_dir}/gittools-dump",
]

[[argv.optional]]
field = "git_dir"
args = ["--git-dir={git_dir}"]

[[argv.optional]]
field = "no_redirects"
equals = "yes"
args = ["--no-redirects"]

[parser]
kind = "none"

[limits]
timeout_millis = 3600000
memory_max_bytes = 1073741824
