id = "git-dumper"
name = "git-dumper"
category = "web_exploit"
summary = "从网站下载暴露的 .git 并尝试还原工作区（arthaud）"

usage = """
【典型 CTF 流程】
1. 确认 http://target/.git/HEAD 可访问
2. 本工具 dump 到「当前任务目录/git-dump」
3. 在该目录 git log / git show / 搜 flag

【实际调用】
git-dumper [选项] URL DIR

上游：https://github.com/arthaud/git-dumper
仅限 CTF / 靶场 / 书面授权。远程 .git 可能恶意。
"""
mode = "embedded_cli"
featured = true
cwd = "Active/git-leak/git-dumper"

[binary]
command = "python3"
path = "Active/git-leak/git-dumper/.venv/bin/git-dumper"
resolve = ["tools_root", "path"]

[ui]
icon = "git"
accent = "orange"

[[form.fields]]
id = "url"
type = "url"
label = "目标 URL"
required = true
from = "target_url"
hint = "站点根或 .git 地址，例 http://target/.git/（建议以 /.git/ 结尾）"

[[form.fields]]
id = "jobs"
type = "number"
label = "并发 -j / --jobs（可选）"
default = "10"
required = false
hint = "同时 HTTP 请求数；过大易被 WAF/限流，靶场常用 5–20"

[[form.fields]]
id = "retry"
type = "number"
label = "重试 -r / --retry（可选）"
default = ""
required = false
hint = "单文件失败后重试次数；网络不稳时调大"

[[form.fields]]
id = "timeout"
type = "number"
label = "超时 -t / --timeout（可选）"
default = ""
required = false
hint = "单次请求最长秒数，超时则放弃该请求"

[[form.fields]]
id = "proxy"
type = "text"
label = "代理 --proxy（可选）"
default = ""
required = false
hint = "例 http://127.0.0.1:8080，把流量导入 Burp 分析"

[[form.fields]]
id = "user_agent"
type = "text"
label = "User-Agent -u（可选）"
default = ""
required = false
hint = "自定义 UA，规避对默认客户端的拦截"

[[form.fields]]
id = "header"
type = "text"
label = "额外头 -H（可选）"
default = ""
required = false
hint = "格式 NAME=VALUE，例 Cookie=PHPSESSID=xxx（需登录才可读 .git 时）"

[[form.fields]]
id = "branch"
type = "text"
label = "额外分支 -b（可选）"
default = ""
required = false
hint = "额外探测的分支名；main/master 等默认会查。例 develop"

[argv]
template = [
  "{url}",
  "{job_dir}/git-dump",
]

[[argv.optional]]
field = "jobs"
args = ["-j", "{jobs}"]

[[argv.optional]]
field = "retry"
args = ["-r", "{retry}"]

[[argv.optional]]
field = "timeout"
args = ["-t", "{timeout}"]

[[argv.optional]]
field = "proxy"
args = ["--proxy", "{proxy}"]

[[argv.optional]]
field = "user_agent"
args = ["-u", "{user_agent}"]

[[argv.optional]]
field = "header"
args = ["-H", "{header}"]

[[argv.optional]]
field = "branch"
args = ["-b", "{branch}"]

[parser]
kind = "none"

[limits]
timeout_millis = 3600000
memory_max_bytes = 1073741824
