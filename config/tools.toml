schema_version = 2

[pack]
id = "flagdeck-recon"
name = "FlagDeck Recon Pack"
version = "1.0.0"
platform = "linux-x86_64"
description = "Managed HTTP, fingerprint, service, path and parameter discovery tools"

[policy]
absolute_paths = true
verify_owner = true
reject_group_or_world_writable = true
verify_sha256_before_each_run = true
inherit_environment = false

[[tool]]
id = "curl"
name = "curl"
pack_id = "flagdeck-recon"
category = "http"
summary = "发送 HTTP 请求并保存响应证据"
integration_mode = "project_cli"
distribution = "system"
license = "curl"
homepage = "https://curl.se/"
command = "curl"
bundled_path = "flagdeck-recon/1.0.0/bin/curl"
system_paths = ["/usr/bin/curl", "/bin/curl"]
pinned_sha256 = "8b275ad9e2229d7929f0355835f0a95f2be0f172aa226e6b5850d836043ec5a4"
version = "8.18.0"
risk_level = "l1"
health_strategy = "safe-version-command"
health_argv = ["--version"]
health_version_marker = "curl 8.18.0"
parser_id = "flagdeck.curl-json"
parser_version = "1.0.0"
fixture_manifest = "tests/fixtures/r2/real/curl/manifest.json"
side_effect_free_help = true
adapter_type = "declarative-cli"
capabilities = ["http_request", "response_evidence"]
permissions = ["network:target_scope", "project_artifacts:read-write"]
network_policy = "input-gate-and-audit"
memory_max_bytes = 268435456
tasks_max = 64
cpu_quota_percent = 100
timeout_millis = 45000
runtime_fingerprint = "fedora-rpm:curl-8.18.0"

