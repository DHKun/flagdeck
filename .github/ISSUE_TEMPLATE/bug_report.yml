name: Bug report
description: 报告可以稳定复现的问题
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 请先清除日志和截图中的目标、Cookie、Token 与凭据。
  - type: input
    id: version
    attributes:
      label: FlagDeck 版本
      placeholder: v1.0.0 / commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Linux 环境
      placeholder: Fedora 44, KDE Plasma, Wayland
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
